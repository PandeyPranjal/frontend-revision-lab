<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms by Pranjal</title>
    <style>
        body{
            background-color: black;
            color: aqua;
        }
    </style>
</head>
<body>
    <h1>This is all about forms learning</h1>

    <form action="" method="get">

        <!-- labels are needed for every input type and for and id should be same -->
        <label for="fname">First Name</label>
        <input type="text" name="" id="fname" placeholder="First name">
        <label for="lname">Last Name</label>
        <input type="text" name="" id="lname" placeholder="Last name">
        <br>
        <select name="choices" id="">
            <option value="firstOne">firstOne</option>
            <option value="SecondOne">SecondOne</option>
        </select>
        <input type="radio" name="chan1" id="">chan1
        <input type="radio" name="chan2" id="">chan2
        <input type="range" name="" min="10" max="100" id="">
        <button type="submit">Pay</button>
    </form>
</body>
</html>
